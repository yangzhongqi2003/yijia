apiVersion: v1
kind: ConfigMap
metadata:
  name: broker-idn-tr-master-conf
  namespace: test-acp
  labels:
    app: rocketmq-broker-idn-tr-master
    component: broker
data:
  broker.conf: |
    brokerClusterName=rocketmq-broker-idn-tr
    brokerName=rocketmq-broker-idn-tr
    brokerId=0
    deleteWhen=04
    fileReservedTime=48
    brokerRole=ASYNC_MASTER
    flushDiskType=ASYNC_FLUSH
    namesrvAddr=rocketmq-nameserver:9876
    storePathRootDir=/home/rocketmq/store
    storePathCommitLog=/home/rocketmq/store/commitlog
---
apiVersion: v1
kind: Service
metadata:
  name: rocketmq-broker-idn-tr-master
  namespace: test-acp
  labels:
    app: rocketmq-broker-idn-tr-master
    component: broker
spec:
  # 单节点/集群两种模式切换说明：
  # 单节点模式：使用普通 ClusterIP，`kubectl get svc` 会显示实际 IP。
  # 集群模式：改回 headless Service（clusterIP: None + publishNotReadyAddresses: true）。
  selector:
    app: rocketmq-broker-idn-tr-master
  ports:
    - name: broker
      port: 10911
      targetPort: 10911
    - name: fast
      port: 10909
      targetPort: 10909
    - name: ha
      port: 10912
      targetPort: 10912
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rocketmq-broker-idn-tr-master
  namespace: test-acp
  labels:
    app: rocketmq-broker-idn-tr-master
    component: broker
spec:
  serviceName: rocketmq-broker-idn-tr-master
  # 当前为单节点；后续如需多副本，可按需提高 replicas。
  replicas: 1
  selector:
    matchLabels:
      app: rocketmq-broker-idn-tr-master
  template:
    metadata:
      labels:
        app: rocketmq-broker-idn-tr-master
        component: broker
    spec:
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      containers:
        - name: broker
          image: apache/rocketmq:5.3.2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
          args:
            - mqbroker
            - "-c"
            - /home/rocketmq/conf/broker.conf
          ports:
            - containerPort: 10911
              name: broker
            - containerPort: 10909
              name: fast
            - containerPort: 10912
              name: ha
          env:
            - name: NAMESRV_ADDR
              value: rocketmq-nameserver:9876
          resources:
            limits:
              cpu: "0.2"
              memory: 4Gi
            requests:
              cpu: 200m
              memory: 500Mi
          livenessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 10911
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: broker-config
              mountPath: /home/rocketmq/conf/broker.conf
              subPath: broker.conf
            - name: test-acp-idn-tr-master-pvc
              mountPath: /home/rocketmq/store
              subPath: store
            - name: test-acp-idn-tr-master-pvc
              mountPath: /home/rocketmq/logs
              subPath: logs
      volumes:
        - name: broker-config
          configMap:
            name: broker-idn-tr-master-conf
            items:
              - key: broker.conf
                path: broker.conf
  volumeClaimTemplates:
    # 多副本时 StatefulSet 会为每个副本自动创建独立 PVC。
    - metadata:
        name: test-acp-idn-tr-master-pvc
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ebs-sc
        resources:
          requests:
            storage: 500Gi
